---
- name: Check for PXE-booted system
  block:
    - name: Check if system is PXE-booted
      ansible.builtin.command:
        cmd: cat /proc/cmdline
      register: boot_cmdline
      changed_when: false
      check_mode: false

    - name: Set fact for PXE-booted system
      ansible.builtin.set_fact:
        is_pxe_booted: "{{ 'root=/dev/nfs' in boot_cmdline.stdout }}"
      when: boot_cmdline.stdout is defined

    - name: Include http_proxy configuration tasks
      ansible.builtin.include_tasks: http_proxy.yml

- name: Deploy K3s http_proxy conf
  include_tasks: http_proxy.yml
  when: proxy_env is defined

- name: Queue k3s service restart for earlier config changes
  ansible.builtin.debug:
    msg: K3s agent restart required by earlier changes
  changed_when: true
  when: >-
    (k3s_binary_download_x64 is defined and k3s_binary_download_x64.changed | default(false))
    or (k3s_binary_download_arm64 is defined and k3s_binary_download_arm64.changed | default(false))
    or (k3s_binary_download_armhf is defined and k3s_binary_download_armhf.changed | default(false))
    or (k3s_flannel_config is defined and k3s_flannel_config.changed | default(false))
    or (k3s_custom_registries_config is defined and k3s_custom_registries_config.changed | default(false))
  notify: Manage k3s service

- name: Configure the k3s service
  ansible.builtin.template:
    src: "k3s.service.j2"
    dest: "{{ systemd_dir }}/k3s-node.service"
    owner: root
    group: root
    mode: '0755'
  notify: Manage k3s service
